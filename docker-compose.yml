services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - api

  api:
    build: ./apps/api
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./apps/api:/app

