services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - non_rag_api

  non_rag_api:
    build: ./apps/non_rag
    ports:
      - "8001:8081"
    env_file:
      - .env
    volumes:
      - ./apps/non_rag:/app

